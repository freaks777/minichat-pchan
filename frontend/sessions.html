<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%236c5ce7'/%3E%3Cpath d='M17 46V18h17c8 0 13 5 13 12s-5 12-13 12h-8v4zm9-12h8c3 0 5-2 5-4s-2-4-5-4h-8z' fill='white'/%3E%3C/svg%3E">
<title>セッション一覧 — RP Standalone</title>
<link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

<nav id="top-nav">
  <a href="/sessions" class="active" data-i18n="navSessions">セッション</a>
  <a href="/studio" data-i18n="navStudio">Studio</a>
  <a href="/settings" data-i18n="navSettings">設定</a>
  <span class="nav-spacer"></span>
  <button id="lang-toggle">EN</button>
</nav>

<div id="sessions-ui">
  <header id="sessions-header">
    <h1 data-i18n="sessionsTitle">セッション一覧</h1>
    <div class="header-nav">
      <button class="btn btn-secondary btn-sm sort-btn" data-sort="updated" data-i18n="sortUpdated">更新順</button>
      <button class="btn btn-secondary btn-sm sort-btn" data-sort="created" data-i18n="sortCreated">作成順</button>
      <button class="btn btn-primary" id="new-session-btn" data-i18n="btnNewSession">新規セッション</button>
    </div>
  </header>

  <div id="sessions-list" class="sessions-list"></div>

  <div id="empty-state" class="empty-state is-hidden">
    <p data-i18n="emptySessions">セッションがありません</p>
    <p class="empty-hint" data-i18n="emptyHint">「新規セッション」から始めてみましょう</p>
  </div>
</div>

<script src="/frontend/js/i18n.js"></script>
<script src="/frontend/js/sessions.js"></script>
<a id="back-to-top" href="#" title="トップへ">↑</a>
</body>
</html>
