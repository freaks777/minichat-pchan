<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%236c5ce7'/%3E%3Cpath d='M17 46V18h17c8 0 13 5 13 12s-5 12-13 12h-8v4zm9-12h8c3 0 5-2 5-4s-2-4-5-4h-8z' fill='white'/%3E%3C/svg%3E">
<title>セッション設定 — RP Standalone</title>
<link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

<nav id="top-nav">
  <a href="/sessions" data-i18n="navSessions">セッション</a>
  <a href="/studio" data-i18n="navStudio">Studio</a>
  <a href="/settings" data-i18n="navSettings">設定</a>
  <span class="nav-spacer"></span>
  <button id="lang-toggle">EN</button>
</nav>

<div id="setup-ui">
  <div class="step active" id="step-persona">
    <h1 data-i18n="setupTitle">セッション設定</h1>
    <p class="step-sub" data-i18n="stepPersonaDesc">使用するキャラクターを選んでください</p>
    <div id="persona-grid" class="persona-grid"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="next-to-style" data-i18n="btnNext">次へ：文体選択</button>
    </div>
  </div>
  <div class="step" id="step-style">
    <h1 data-i18n="customStyleTitle">文体設定</h1>
    <p class="step-sub"><span id="selected-persona-name"></span></p>
    <div id="style-preset-list"></div>
    <div id="custom-style-opts" class="is-hidden setup-custom-options">
      <div class="setting-row">
        <label data-i18n="customViewpoint">語り手</label>
        <select id="setup-viewpoint">
          <option value="ai_character" data-i18n-value="optAIChar">AIキャラ視点</option>
          <option value="user_character" data-i18n-value="optUserChar">ユーザーキャラ視点</option>
        </select>
      </div>
      <div class="setting-row">
        <label data-i18n="customNarration">地の文</label>
        <select id="setup-narration">
          <option value="true" data-i18n-value="optNarrationOn">あり</option>
          <option value="false" data-i18n-value="optNarrationOff">なし</option>
        </select>
      </div>
      <div class="setting-row" id="setup-person-row">
        <label data-i18n="customPerson">人称</label>
        <select id="setup-person">
          <option value="first" data-i18n-value="optFirstPerson">一人称</option>
          <option value="third" data-i18n-value="optThirdPerson">三人称</option>
        </select>
      </div>
    </div>
    <div class="u-margin-top-20">
      <label data-i18n="memoryScope" class="setup-block-label">記憶スコープ</label>
      <select id="memory-scope" class="u-width-full">
        <option value="session" data-i18n-value="optMemorySession">このセッションのみ</option>
        <option value="persona" data-i18n-value="optMemoryPersona">全セッション共通</option>
      </select>
      <div class="setting-hint setup-memory-hint" data-i18n="hintMemoryScope">
        このセッションのみ：会話の記憶を他のセッションと共有しません。全セッション共通：同一キャラの全セッションで記憶を共有します。
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="back-to-persona" data-i18n="btnBack">戻る</button>
      <button class="btn btn-primary" id="start-session-btn" data-i18n="styleStart">セッション開始</button>
    </div>
  </div>
  <div class="overlay is-hidden" id="loading-overlay">
    <div class="spinner"></div>
    <span data-i18n="loadingText">読み込み中...</span>
  </div>
</div>

<script src="/frontend/js/i18n.js"></script>
<script src="/frontend/js/session-setup.js"></script>
</body>
</html>
