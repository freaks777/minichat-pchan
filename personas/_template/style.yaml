# 文体プリセット定義
# viewpoint: ai_character（AIキャラ視点）/ user_character（ユーザーキャラ視点）
# person: first（一人称）/ third（三人称）
# narration: true（地の文あり）/ false（地の文なし）

style:
  viewpoint: ai_character
  person: first
  narration: true

presets:
  - id: novel_ai
    label: "小説調（AI視点・一人称）"
    style: { viewpoint: ai_character, person: first, narration: true }
  - id: novel_user
    label: "小説調・ユーザー視点（三人称）"
    style: { viewpoint: user_character, person: third, narration: true }
  - id: chat
    label: "チャット調（地の文なし）"
    style: { viewpoint: ai_character, person: first, narration: false }
