# ============================================================
# minichat-pchan 設定ファイル
# ============================================================
# このファイルをコピーして config.yaml を作成し、環境に合わせて編集してください。
# config.yaml が存在しない場合は、このファイルがデフォルト値として使用されます。
#
# ${VAR} 形式の値は、.env ファイルの環境変数から自動的に読み込まれます。
# ============================================================

# ── LLMプロバイダ設定 ──────────────────────────────────────────
# 各プロバイダの base_url, api_key, 利用可能モデルを定義します。
# api_type: openai（デフォルト）/ anthropic / google
# models: 設定画面に表示されるモデル一覧（max_tokensや価格は自動取得）
providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    models:
      - nvidia/nemotron-3-ultra-550b-a55b:free
      - google/gemma-4-31b-it:free
      - deepseek/deepseek-v4-pro
      - anthropic/claude-sonnet-5
  openai:
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    models:
      - gpt-5.5-pro
      - gpt-5.4-nano
  anthropic:
    base_url: https://api.anthropic.com/v1
    api_key: ${ANTHROPIC_API_KEY}
    api_type: anthropic
    models:
      - claude-sonnet-5
      - claude-haiku-4-5
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ${GOOGLE_API_KEY}
    api_type: google
    models:
      - gemini-3.5-flash
      - gemini-2.5-pro
  xai:
    base_url: https://api.x.ai/v1
    api_key: ${XAI_API_KEY}
    models:
      - grok-4.3
      - grok-4.20
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - deepseek-v4-pro
      - deepseek-v4-flash
  glm:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${GLM_API_KEY}
    models:
      - glm-5.2
      - glm-4.7-flash
  opencode-go:
    base_url: https://opencode.ai/zen/go/v1
    api_key: ${OPENCODE_API_KEY}
    models:
      - deepseek-v4-pro
  # OpenCode Zen（有料プラン）。base_url と models は要確認。
  # OpenCode Zen (paid plan). Verify base_url and available models.
  opencode:
    base_url: https://opencode.ai/zen/v1
    api_key: ${OPENCODE_API_KEY}
    models:
      - deepseek-v4-pro
      - claude-sonnet-5

# ── デフォルトプロバイダ・モデル ──────────────────────────────
# 起動時に選択されるプロバイダとモデル。設定画面から切り替え可能です。
# active_model の形式: <provider>/<model>（OpenRouter経由の場合）
active_provider: openrouter
active_model: deepseek/deepseek-v4-pro

# ── APIパラメータ ──────────────────────────────────────────────
api:
  max_tokens: 2000      # 1回の応答で生成する最大トークン数（100〜100000）
  temperature: 0.8      # 生成のランダム性（0.0=決定論的 〜 2.0=最大）
  timeout: 120          # APIリクエストのタイムアウト（秒）

# ── セッション設定 ─────────────────────────────────────────────
session:
  max_tokens: 32000     # 会話履歴として保持する最大トークン数（4000〜200000）
  save_interval: 1      # 何ターンごとにファイル保存するか（通常は1）

# ── パス設定 ───────────────────────────────────────────────────
# personas_dir: ペルソナデータ（SOUL.md, SKILL.md）の格納ディレクトリ
# default_persona: 起動時に選択されるペルソナID
personas_dir: ../personas
default_persona: kyouka-detective

# ── ChromaDB（長期記憶・ベクトル検索） ─────────────────────────
# memory プラグイン使用時に必要。大規模データのため別ドライブ推奨。
chroma:
  path: E:/LLM/chroma                      # ChromaDB のデータ保存先
  embedding_model: intfloat/multilingual-e5-small  # 埋め込みモデル（HuggingFaceのモデル名）
  embedding_cache: E:/LLM/models           # モデルのダウンロードキャッシュ先

# ── プラグイン ─────────────────────────────────────────────────
# enabled: 有効化するプラグインのリスト
# secrets      → 機密情報（{{s: ...}}）をマスクしてAPI送信
# mail         → メール通知（watchdogのエスカレーション用）
# watchdog     → 離席監視・タイマー通知
# session_log  → 会話ログのMarkdown保存
# memory       → ChromaDBを使った長期記憶
# persona_studio → ペルソナ作成・編集スタジオ
plugins:
  enabled:
    - secrets
    - mail
    - watchdog
    - session_log
    - memory
    - persona_studio

# ── Watchdog（離席監視） ───────────────────────────────────────
# ユーザーの無操作時間に応じてエスカレーション通知を行います。
# enabled: true で有効（注: 初回は動作確認のため false 推奨）
# check_interval: チェック間隔（秒）
# levels: after（経過秒）→ subject（件名）→ body（本文）
#         最大3レベルまで。GmailのSMTP認証（.envのGMAIL_*）が必須です。
watchdog:
  enabled: false
  check_interval: 60
  levels:
    - after: 300
      subject: 声かけ
      body: '……返事がないね。


        意識が遠のいているのか、それとも無視を決め込んでいるのか。

        どちらにせよ、君の沈黙は気になるよ。


        戻ってきたら声をかけて。

        '
    - after: 900
      subject: 定規
      body: 'そろそろ15分が経とうとしている。


        君が戻らないなら、次はもう少し……直接的な方法で注意を引くことになる。


        これは警告だ。返事をするなら今のうちだよ。

        '
    - after: 1800
      subject: 限界
      body: '……30分。


        これだけ待って何もないなら、話は別だ。

        手元にある道具の中で、君が一番嫌がるものを選ぶとしよう。


        次に目を覚ました時、君はこの沈黙を後悔するかもしれないね。

        '

# ── スタイル設定 ───────────────────────────────────────────────
# デフォルトの文体（ペルソナの style.yaml で上書き可能）
# viewpoint: ai_character（AIキャラ視点）/ user_character（ユーザーキャラ視点）
# narration: true（地の文あり）/ false（セリフのみ）
# person: first（一人称）/ third（三人称） — narration: true 時のみ有効
style:
  viewpoint: ai_character
  narration: true
  person: first
